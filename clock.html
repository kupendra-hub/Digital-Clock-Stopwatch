<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Clock Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:20px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
font-size:42px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
margin:25px 0;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

.card h2{
margin-bottom:20px;
color:#00eaff;
}

.world-clocks{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.world{
width:250px;
padding:20px;
background:rgba(255,255,255,0.08);
border-radius:15px;
}

.world h3{
margin-bottom:10px;
}

.world-time{
font-size:28px;
font-weight:bold;
}

input{
padding:10px;
border:none;
border-radius:8px;
font-size:16px;
margin:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
margin:5px;
}

button:hover{
background:white;
}

.stopwatch-display,
.timer-display{
font-size:45px;
font-weight:bold;
margin:20px 0;
}

#alarmStatus{
margin-top:15px;
font-size:18px;
color:#fff;
}

@media(max-width:768px){

.world{
width:100%;
}

h1{
font-size:30px;
}

.stopwatch-display,
.timer-display{
font-size:30px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>⏰ Digital Clock Hub</h1>

<!-- WORLD CLOCK -->

<div class="card">

<h2>🌍 World Clock</h2>

<div class="world-clocks">

<div class="world">
<h3>🇮🇳 India</h3>
<div class="world-time" id="indiaClock"></div>
</div>

<div class="world">
<h3>🏛️ New Delhi</h3>
<div class="world-time" id="delhiClock"></div>
</div>

<div class="world">
<h3>🇬🇧 London</h3>
<div class="world-time" id="londonClock"></div>
</div>

</div>

</div>

<!-- ALARM CLOCK -->

<div class="card">

<h2>⏰ Alarm Clock</h2>

<input type="time" id="alarmTime">

<br>

<button onclick="setAlarm()">
Set Alarm
</button>

<p id="alarmStatus">
No Alarm Set
</p>

</div>

<!-- STOPWATCH -->

<div class="card">

<h2>⏱ Stopwatch</h2>

<div class="stopwatch-display" id="stopwatch">
00:00:00
</div>

<button onclick="startStopwatch()">Start</button>
<button onclick="pauseStopwatch()">Pause</button>
<button onclick="resetStopwatch()">Reset</button>

</div>

<!-- TIMER -->

<div class="card">

<h2>⏳ Countdown Timer</h2>

<input
type="number"
id="timerInput"
placeholder="Enter Seconds">

<br>

<div class="timer-display" id="timer">
00:00
</div>

<button onclick="startTimer()">Start Timer</button>
<button onclick="resetTimer()">Reset</button>

</div>

</div>

<script>

/* WORLD CLOCK */

function updateClocks(){

let now = new Date();

document.getElementById("indiaClock").innerHTML =
now.toLocaleTimeString("en-IN",{
timeZone:"Asia/Kolkata"
});

document.getElementById("delhiClock").innerHTML =
now.toLocaleTimeString("en-IN",{
timeZone:"Asia/Kolkata"
});

document.getElementById("londonClock").innerHTML =
now.toLocaleTimeString("en-GB",{
timeZone:"Europe/London"
});

}

setInterval(updateClocks,1000);
updateClocks();

/* ALARM CLOCK */

let alarmTime = "";

function setAlarm(){

alarmTime =
document.getElementById("alarmTime").value;

document.getElementById("alarmStatus").innerHTML =
"Alarm Set For : " + alarmTime;

}

setInterval(function(){

let now = new Date();

let currentTime =
String(now.getHours()).padStart(2,"0")
+ ":" +
String(now.getMinutes()).padStart(2,"0");

if(alarmTime === currentTime){

alert("⏰ Alarm Ringing!");

alarmTime = "";

document.getElementById("alarmStatus").innerHTML =
"No Alarm Set";

}

},1000);

/* STOPWATCH */

let stopwatchSeconds = 0;
let stopwatchInterval;

function updateStopwatch(){

let hrs =
Math.floor(stopwatchSeconds/3600);

let mins =
Math.floor((stopwatchSeconds%3600)/60);

let secs =
stopwatchSeconds%60;

document.getElementById("stopwatch").innerHTML =
String(hrs).padStart(2,"0")
+ ":" +
String(mins).padStart(2,"0")
+ ":" +
String(secs).padStart(2,"0");

}

function startStopwatch(){

clearInterval(stopwatchInterval);

stopwatchInterval = setInterval(function(){

stopwatchSeconds++;

updateStopwatch();

},1000);

}

function pauseStopwatch(){

clearInterval(stopwatchInterval);

}

function resetStopwatch(){

clearInterval(stopwatchInterval);

stopwatchSeconds = 0;

updateStopwatch();

}

/* TIMER */

let timerInterval;
let timerSeconds = 0;

function startTimer(){

clearInterval(timerInterval);

timerSeconds =
parseInt(document.getElementById("timerInput").value);

if(isNaN(timerSeconds) || timerSeconds <= 0){

alert("Please Enter Valid Seconds");

return;

}

timerInterval = setInterval(function(){

let mins =
Math.floor(timerSeconds/60);

let secs =
timerSeconds%60;

document.getElementById("timer").innerHTML =
String(mins).padStart(2,"0")
+ ":" +
String(secs).padStart(2,"0");

timerSeconds--;

if(timerSeconds < 0){

clearInterval(timerInterval);

alert("⏳ Timer Finished!");

}

},1000);

}

function resetTimer(){

clearInterval(timerInterval);

document.getElementById("timer").innerHTML =
"00:00";

document.getElementById("timerInput").value =
"";

}

</script>

</body>
</html>
